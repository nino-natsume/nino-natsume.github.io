baseURL = 'https://nino-natsume.github.io/'
theme = 'hugo-theme-reimu'
defaultContentLanguage = 'zh-CN'
enableEmoji = 'true'
[languages]
[languages.zh-CN]
languageCode = 'zh-CN'
languageName = '简体中文'
weight = 1
hasCJKLanguage = 'true'
title = '次元星域'
author = '夏沐真凉'

[languages.zh-TW]
languageCode = 'zh-TW'
languageName = '繁體中文'
weight = 2
hasCJKLanguage = 'true'
title = '次元星域'
author = '夏沐真凉'

[languages.ja]
languageCode = 'ja'
languageName = '日本語'
weight = 3
hasCJKLanguage = 'true'
title = '次元星域'
author = '夏沐真凉'

[languages.en]
languageCode = 'en'
languageName = 'English'
weight = 4
hasCJKLanguage = 'true'
title = 'Jigen_Seiki'
author = 'Nino_Natsume'

[markup.highlight]
guessSyntax = 'true'
noClasses = 'false'

[markup.goldmark.extensions.passthrough]
enable = 'true'
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[outputs]
home = ["Algolia", "HTML", "RSS"]

[outputFormats.Algolia]
baseName = "algolia"
isPlainText = 'true'
mediaType = "application/json"
notAlternative = 'true'

[markup]
  [markup.tableOfContents]
    endLevel = 4
    ordered = 'true'
    startLevel = 1